name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown,${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Trunk
        uses: taiki-e/install-action@v2
        with:
          tool: trunk

      - name: Build frontend assets
        run: env -u NO_COLOR trunk build --release --no-default-features --features csr

      - name: Build binary
        run: cargo build --release --bin dnsmasqweb --features ssr --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          name="dnsmasqweb-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir -p "pkg/$name"
          cp "target/${{ matrix.target }}/release/dnsmasqweb" "pkg/$name/"
          cp README.md LICENSE "pkg/$name/"
          tar -C pkg -czf "$name.tar.gz" "$name"
          echo "ASSET=$name.tar.gz" >> "$GITHUB_ENV"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
