# 只监听 WireGuard 内网接口，不影响公网
interface=wg0
bind-interfaces

# 内网域名解析 → Nginx Proxy Manager 的 IP
address=/gateway.example.internal/10.10.0.1
address=/mg-test.example.internal/10.10.0.1
address=/pay-merchant.example.internal/10.10.0.1
address=/pay-manager.example.internal/10.10.0.1
address=/code.example.internal/10.10.0.1
address=/cd.example.internal/10.10.0.1
address=/job.example.internal/10.10.0.1
address=/job-test.example.internal/10.10.0.1
address=/label.example.internal/10.10.0.1
address=/mg.example.internal/10.10.0.1
address=/.test-edu.example.internal/10.10.0.1
address=/vip-test.example.internal/10.10.0.1
address=/vpn.example.internal/10.10.0.1
address=/dns.example.internal/10.10.0.1

# 继续添加更多服务...

# 其他域名走上游公共 DNS
server=223.5.5.5
server=223.6.6.6

# 不读取 /etc/hosts（隔离）
no-hosts

# 日志（调试用，稳定后可关闭）
#log-queries
#log-facility=/var/log/dnsmasq.log
